name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - uses: julia-actions/cache@v2

      # Add registries before instantiating. General must be explicit because
      # Julia adds it lazily and it may not be present when Pkg.instantiate() runs.
      # LabRegistry resolves NArrays and other lab packages; both repos must be
      # public, or a PAT stored as LABREGISTRY_TOKEN must be used.
      - name: Add registries
        run: |
          julia -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.Registry.add(RegistrySpec(url="https://github.com/lemieux-lab/LabRegistry.git"))
          '

      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - uses: julia-actions/julia-runtest@v1
